<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.row{display:grid;grid-template-columns:92px 1fr;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
.row:last-child{border-bottom:0}
.lbl{font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-soft);font-family:var(--font-mono)}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Type scale</span></div>
  <div class="row"><span class="lbl">72 · display</span><span class="display" style="font-size:44px;line-height:1;font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 50">Display</span></div>
  <div class="row"><span class="lbl">48 · h1</span><span style="font-size:34px;letter-spacing:-.028em;font-weight:700;color:var(--fg-strong)">Heading one</span></div>
  <div class="row"><span class="lbl">32 · h2</span><span style="font-size:24px;letter-spacing:-.022em;font-weight:700;color:var(--fg-strong)">Heading two</span></div>
  <div class="row"><span class="lbl">20 · h3</span><span style="font-size:18px;letter-spacing:-.015em;font-weight:700;color:var(--fg-strong)">Heading three</span></div>
  <div class="row"><span class="lbl">17 · body</span><span style="font-size:15px;line-height:1.5;color:var(--fg-body)">Body. Quiet and legible.</span></div>
  <div class="row"><span class="lbl">13 · ui</span><span style="font-size:12.5px;color:var(--fg-body);font-weight:500">UI text — buttons, rows, chips.</span></div>
  <div class="row"><span class="lbl">11 · label</span><span class="eyebrow">Label · tracked caps</span></div>
</div>
</body></html>
