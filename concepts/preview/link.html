<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300..800&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F7F8FA;--surface:#FFFFFF;
  --ink-9:#0A0B0F;--ink-7:#22242B;--ink-5:#5A5D68;--ink-4:#878A95;--ink-2:#D7D9E0;
  --fg-strong:var(--ink-9);--fg-body:var(--ink-7);--fg-muted:var(--ink-5);--fg-soft:var(--ink-4);
  --border:var(--ink-2);
  --sky:#1F6FD4;--sky-hi:#0F4E9E;
  --font-sans:"Plus Jakarta Sans",system-ui,sans-serif;
  --font-display:"Fraunces",Georgia,serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.rowmeta{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:12px;margin-bottom:4px}
.stack{display:flex;flex-direction:column;gap:10px;margin-top:8px}
.line{font-size:14px;line-height:1.5;color:var(--fg-body)}

/* Link variants — text-decoration with tight underline offset */
.link{
  color:var(--fg-strong);
  text-decoration:underline;
  text-decoration-color:currentColor;
  text-decoration-thickness:1px;
  text-underline-offset:2px;
  cursor:pointer;
  transition:opacity .14s,color .14s,text-decoration-color .14s;
}
.link:hover{opacity:.65}
.link--sky{color:var(--sky)}
.link--sky:hover{color:var(--sky-hi);opacity:1}
.link--muted{color:var(--fg-muted);text-decoration-color:var(--ink-2);text-decoration-style:dotted;text-decoration-thickness:1px}
.link--muted:hover{color:var(--fg-strong);opacity:1;text-decoration-color:currentColor;text-decoration-style:solid}
.link--inline{color:inherit;text-decoration-color:var(--ink-3)}
.link--inline:hover{text-decoration-color:currentColor;opacity:1}
.link--external{display:inline-flex;align-items:center;gap:3px}
.link--external svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-top:-2px}
.link--nav{color:var(--fg-body);text-decoration:none;font-weight:500}
.link--nav:hover{color:var(--fg-strong);opacity:1}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Link</span></div>

  <div class="rowmeta">Inline</div>
  <div class="stack">
    <div class="line">A default <a class="link" href="#">ink underline</a> inside prose reads as native type.</div>
    <div class="line">Use a <a class="link link--sky" href="#">sky link</a> when the pointer is the whole point.</div>
    <div class="line">A <a class="link link--muted" href="#">muted link</a> reveals its underline on hover.</div>
    <div class="line">This sentence contains an <a class="link link--external" href="#">external reference<svg viewBox="0 0 24 24"><path d="M7 17L17 7M9 7h8v8"/></svg></a> with a glyph.</div>
  </div>

  <div class="rowmeta">Nav</div>
  <div class="stack">
    <div class="line"><a class="link link--nav" href="#">Overview</a>  &nbsp;  <a class="link link--nav" href="#">Models</a>  &nbsp;  <a class="link link--nav" href="#">Pricing</a>  &nbsp;  <a class="link link--nav" href="#">Docs</a></div>
  </div>
</div>
</body></html>
