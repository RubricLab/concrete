<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.spec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-3);padding:14px}
.face{font-size:34px;letter-spacing:-.025em;color:var(--fg-strong);margin:4px 0 6px}
.face-d{font-family:var(--font-display);font-weight:300;font-variation-settings:'opsz' 144,'SOFT' 50;font-size:40px;letter-spacing:-.03em}
.face-d em{font-variation-settings:'opsz' 144,'SOFT' 100,'WONK' 1;font-style:italic}
.face-m{font-family:var(--font-mono);font-weight:500;letter-spacing:-.005em}
.w{display:flex;flex-wrap:wrap;gap:10px;font-size:11.5px;color:var(--fg-body)}
</style></head>
<body>
<div class="card" style="padding:16px">
  <div class="grid">
    <div class="spec">
      <div class="eyebrow">Jakarta · UI</div>
      <div class="face">Aa Bb 01</div>
      <div class="w"><span style="font-weight:400">400</span><span style="font-weight:500">500</span><span style="font-weight:600">600</span><span style="font-weight:700">700</span></div>
    </div>
    <div class="spec">
      <div class="eyebrow">Fraunces · Display</div>
      <div class="face face-d"><em>Aa&nbsp;Bb</em>&nbsp;01</div>
      <div class="w"><span style="font-family:var(--font-display);font-variation-settings:'opsz' 144,'SOFT' 50">Soft 50</span><span style="font-family:var(--font-display);font-variation-settings:'opsz' 144,'SOFT' 100,'WONK' 1;font-style:italic">Wonk italic</span></div>
    </div>
    <div class="spec">
      <div class="eyebrow">JetBrains · Mono</div>
      <div class="face face-m">Aa 01</div>
      <div class="w"><span class="mono" style="font-weight:400">400</span><span class="mono" style="font-weight:500">500</span><span class="mono" style="font-weight:700">700</span></div>
    </div>
  </div>
</div>
</body></html>
