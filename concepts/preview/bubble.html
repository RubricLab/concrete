<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:10px;align-items:start}
.lbl{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--fg-soft);margin-bottom:8px}
.bubble{padding:9px 14px;font-size:13px;line-height:1.45;max-width:100%;width:fit-content}
.bubble--in{background:var(--surface);border:1px solid var(--border);color:var(--fg-body);border-radius:14px 14px 14px 4px}
.bubble--out{background:var(--ink-9);color:#fff;border-radius:14px 14px 4px 14px;margin-left:auto}
</style></head>
<body>
<div class="card" style="padding:14px 16px">
  <div class="eyebrow-row"><span class="eyebrow">Bubble</span></div>
  <div class="wrap">
    <div>
      <div class="lbl">inbound</div>
      <div class="bubble bubble--in">Lorem ipsum dolor sit amet.</div>
    </div>
    <div>
      <div class="lbl">outbound</div>
      <div class="bubble bubble--out">Lorem ipsum dolor sit amet.</div>
    </div>
  </div>
</div>
</body></html>
