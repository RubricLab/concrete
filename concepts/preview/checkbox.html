<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
@import url("_card.css");
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.stack{display:flex;flex-direction:column;gap:6px;margin-top:6px}
.opt{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:12.5px;color:var(--fg-body);height:22px}
.opt input{position:absolute;opacity:0;pointer-events:none}

/* Concrete checkbox — square, hairline, sharper corners */
.cb{
  width:14px;height:14px;border:1px solid #B4B7C0;border-radius:3px;
  background:var(--surface);
  display:inline-flex;align-items:center;justify-content:center;flex:none;
  transition:background .12s,border-color .12s;
}
.cb svg{width:10px;height:10px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:square;stroke-linejoin:miter;opacity:0;transition:opacity .1s}
.opt:hover .cb{border-color:var(--ink-5)}
.opt input:checked + .cb{background:var(--ink-9);border-color:var(--ink-9)}
.opt input:checked + .cb svg{opacity:1}
.opt input:focus-visible + .cb{box-shadow:0 0 0 3px var(--sky-ring)}

.cb--indeterminate{background:var(--ink-9);border-color:var(--ink-9);position:relative}
.cb--indeterminate::after{content:"";position:absolute;inset:auto 3px;height:2px;background:#fff}

.opt.is-disabled{opacity:.45;cursor:not-allowed}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Checkbox</span></div>
  <div class="stack">
    <label class="opt"><input type="checkbox"/><span class="cb"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></span>Subscribe to weekly digest</label>
    <label class="opt"><input type="checkbox" checked/><span class="cb"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></span>Show resolved threads</label>
    <label class="opt"><input type="checkbox"/><span class="cb cb--indeterminate"></span>Select all (3 of 8)</label>
    <label class="opt is-disabled"><input type="checkbox" disabled/><span class="cb"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg></span>Workspace setting locked</label>
  </div>
</div>
</body></html>
