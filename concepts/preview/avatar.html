<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F7F8FA;--surface:#FFFFFF;--sunken:#F1F2F5;
  --ink-9:#0A0B0F;--ink-8:#16171C;--ink-7:#22242B;--ink-5:#5A5D68;--ink-4:#878A95;--ink-3:#B4B7C0;--ink-2:#D7D9E0;--ink-1:#E8EAEE;
  --fg-strong:var(--ink-9);--fg-body:var(--ink-7);--fg-muted:var(--ink-5);--fg-soft:var(--ink-4);
  --border:var(--ink-2);
  --terminal:#0EA564;
  --font-sans:"Plus Jakarta Sans",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.rowmeta{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:14px;margin-bottom:8px}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:6px}

/* Concrete avatar — ink ramp only, no hues. Initials or photo. */
.av{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:var(--ink-9);color:#fff;
  font-weight:600;letter-spacing:.01em;
  flex:none;user-select:none;overflow:hidden;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);
}
.av--xs{width:18px;height:18px;font-size:8.5px}
.av--sm{width:22px;height:22px;font-size:9.5px}
.av--md{width:28px;height:28px;font-size:11px}
.av--lg{width:40px;height:40px;font-size:14px}
.av--xl{width:56px;height:56px;font-size:19px}

.av img{width:100%;height:100%;object-fit:cover}

/* Tonal ink ramp — four steps from dark to light. No hue shifts. */
.av--t1{background:var(--ink-9);color:#fff}
.av--t2{background:var(--ink-7);color:#fff}
.av--t3{background:var(--ink-5);color:#fff}
.av--t4{background:var(--ink-2);color:var(--ink-8)}
.av--t5{background:var(--ink-1);color:var(--ink-7)}

/* Ring — for the signature "you" avatar. Solid ink halo, no double outline. */
.av--ring{box-shadow:0 0 0 2px var(--canvas),0 0 0 3px var(--ink-9)}

/* Status dot — bitten out of avatar instead of ringed */
.av-wrap{position:relative;display:inline-flex}
.av-wrap::before{
  content:"";position:absolute;right:-2px;bottom:-2px;z-index:1;
  width:12px;height:12px;border-radius:50%;
  background:var(--canvas);
}
.av-wrap::after{
  content:"";position:absolute;right:0;bottom:0;z-index:2;
  width:8px;height:8px;border-radius:50%;
  background:var(--terminal);
}
.av-wrap.is-away::after{background:var(--ink-4)}
.av-wrap.is-off::after{background:var(--ink-3)}

/* Stack — single crisp separator via notch, no double ring */
.stack{display:inline-flex}
.stack .av{margin-left:-6px;box-shadow:-2px 0 0 var(--canvas)}
.stack .av:first-child{margin-left:0;box-shadow:none}
.more{
  width:28px;height:28px;border-radius:50%;background:var(--sunken);color:var(--fg-muted);
  border:0;display:inline-flex;align-items:center;justify-content:center;
  font-size:10.5px;font-weight:600;margin-left:-6px;font-variant-numeric:tabular-nums;
  box-shadow:-2px 0 0 var(--canvas);
}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Avatar</span></div>

  <div class="rowmeta">Sizes</div>
  <div class="row">
    <span class="av av--xs">A</span>
    <span class="av av--sm">KT</span>
    <span class="av av--md">MR</span>
    <span class="av av--lg">DS</span>
    <span class="av av--xl">JH</span>
  </div>

  <div class="rowmeta">Tonal ramp — ink only</div>
  <div class="row">
    <span class="av av--md av--t1">AR</span>
    <span class="av av--md av--t2">KT</span>
    <span class="av av--md av--t3">MR</span>
    <span class="av av--md av--t4">DS</span>
    <span class="av av--md av--t5">EL</span>
  </div>

  <div class="rowmeta">With status</div>
  <div class="row">
    <span class="av-wrap"><span class="av av--md av--t1">AR</span></span>
    <span class="av-wrap is-away"><span class="av av--md av--t3">KT</span></span>
    <span class="av-wrap is-off"><span class="av av--md av--t4">MR</span></span>
    <span class="av av--md av--ring av--t1">JH</span>
  </div>

  <div class="rowmeta">Stack</div>
  <div class="row">
    <div class="stack">
      <span class="av av--md av--t1">AR</span>
      <span class="av av--md av--t3">KT</span>
      <span class="av av--md av--t4">MR</span>
      <span class="av av--md av--t5">DS</span>
      <span class="more">+4</span>
    </div>
  </div>
</div>
</body></html>
