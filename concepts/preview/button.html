<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F7F8FA;--surface:#FFFFFF;--raised:#FCFCFD;--sunken:#F1F2F5;--mist:#EAECF0;
  --ink-9:#0A0B0F;--ink-8:#16171C;--ink-7:#22242B;--ink-5:#5A5D68;--ink-4:#878A95;--ink-3:#B4B7C0;--ink-2:#D7D9E0;--ink-1:#E8EAEE;
  --fg-strong:var(--ink-9);--fg-body:var(--ink-7);--fg-muted:var(--ink-5);--fg-soft:var(--ink-4);
  --border:var(--ink-2);--border-hi:var(--ink-3);--border-soft:var(--ink-1);
  --sky:#1F6FD4;--sky-hi:#0F4E9E;--sky-soft:#DDE8F7;--sky-ring:rgba(31,111,212,.28);

  /* The three system signals — exactly as defined in colors-signals */
  --terminal:#0EA564;--terminal-hi:#0A8350;
  --ultra:#6B5BFF;--ultra-hi:#4F3FE0;
  --error:#E23B3B;--error-hi:#A72323;

  --font-sans:"Plus Jakarta Sans",system-ui,sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
.rowmeta{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:14px;margin-bottom:-2px}

/* Base */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  height:28px;padding:0 11px;
  border:1px solid transparent;border-radius:6px;
  font:600 12.5px/1 var(--font-sans);
  letter-spacing:-.005em;
  white-space:nowrap;cursor:pointer;user-select:none;
  background:transparent;color:var(--fg-strong);
  transition:background .12s cubic-bezier(.2,0,0,1),border-color .12s,color .12s,box-shadow .12s,transform .06s;
  font-feature-settings:"ss01","cv01","tnum";
  position:relative;
}
.btn:focus-visible{outline:0;box-shadow:0 0 0 3px var(--sky-ring)}
.btn:active{transform:translateY(.5px)}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex:none}

/* Core variants */
/* Flatten the other filled buttons too — one inset highlight, one soft ground shadow. */
.btn--primary{background:var(--ink-9);border-color:var(--ink-9);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 1px 0 rgba(0,0,0,.2),0 1px 2px rgba(10,11,15,.1)}
.btn--primary:hover{background:var(--ink-8);border-color:var(--ink-8)}

.btn--sky{background:var(--sky);border-color:var(--sky);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 1px 0 rgba(0,0,0,.18),0 1px 2px rgba(15,78,158,.18)}
.btn--sky:hover{background:var(--sky-hi);border-color:var(--sky-hi)}

.btn--secondary{background:var(--surface);border-color:var(--border);color:var(--fg-strong);box-shadow:0 1px 0 var(--border)}
.btn--secondary:hover{border-color:var(--border-hi);background:var(--raised)}

.btn--soft{background:var(--sunken);border-color:var(--sunken);color:var(--fg-strong);box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.btn--soft:hover{background:var(--mist);border-color:var(--mist)}

.btn--ghost{background:transparent;border-color:transparent;color:var(--fg-body)}
.btn--ghost:hover{background:var(--mist);color:var(--fg-strong)}

.btn--sky-soft{background:var(--sky-soft);border-color:var(--sky-soft);color:var(--sky-hi);box-shadow:inset 0 1px 0 rgba(255,255,255,.4)}
.btn--sky-soft:hover{background:#CCDBEF;border-color:#CCDBEF}

/* Signal variants — use the three system signals. Flat solid fills, one subtle inner highlight. */
.btn--error,.btn--danger{background:var(--error);border-color:var(--error);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 1px 0 rgba(0,0,0,.18),0 1px 2px rgba(226,59,59,.2)}
.btn--error:hover,.btn--danger:hover{background:var(--error-hi);border-color:var(--error-hi)}

/* Ultra — upgrade / subscribe CTA. Flat violet with one highlight line, soft purple halo. No gradient. */
.btn--ultra{
  background:var(--ultra);
  border-color:var(--ultra);
  color:#fff;
  font-weight:700;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.2),
    0 1px 0 rgba(40,24,120,.22),
    0 1px 4px rgba(107,91,255,.28);
}
.btn--ultra:hover{
  background:var(--ultra-hi);
  border-color:var(--ultra-hi);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.2),
    0 1px 0 rgba(40,24,120,.22),
    0 2px 8px rgba(107,91,255,.38);
}
.btn--ultra:focus-visible{box-shadow:
    inset 0 1px 0 rgba(255,255,255,.2),
    0 0 0 3px rgba(107,91,255,.32);
}
.btn--ultra .glyph{display:inline-flex;color:#fff}
.btn--ultra .glyph svg{stroke:none;fill:currentColor}

/* Sizes */
.btn--xs{height:22px;padding:0 8px;font-size:11.5px;border-radius:5px;gap:4px}
.btn--xs svg{width:11px;height:11px}
.btn--sm{height:25px;padding:0 9px;font-size:12px;border-radius:5px;gap:4px}
.btn--sm svg{width:12px;height:12px}
.btn--lg{height:34px;padding:0 14px;font-size:13.5px;border-radius:7px}
.btn--lg svg{width:14px;height:14px}

/* Icon-only */
.btn--icon{width:28px;padding:0}
.btn--icon.btn--xs{width:22px}
.btn--icon.btn--sm{width:25px}
.btn--icon.btn--lg{width:34px}

.btn:disabled{cursor:not-allowed;opacity:.45;transform:none}
.btn .spin{width:12px;height:12px;border:1.75px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;opacity:.85}
@keyframes spin{to{transform:rotate(360deg)}}

/* Kbd slot inside button */
.btn .bk{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;padding:0 4px;
  border-radius:3px;
  font:600 10px/1 var(--font-mono);
  letter-spacing:.02em;font-variant-numeric:tabular-nums;
  margin-right:-3px;margin-left:4px;
}
.btn--primary .bk,.btn--sky .bk,.btn--error .bk,.btn--danger .bk,.btn--ultra .bk{background:rgba(255,255,255,.14);color:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.2);border-bottom:1px solid rgba(255,255,255,.3)}
.btn--secondary .bk,.btn--soft .bk,.btn--ghost .bk{background:var(--surface);color:var(--fg-muted);border:1px solid var(--border);border-bottom:1px solid var(--border-hi)}
.btn--sky-soft .bk{background:rgba(255,255,255,.55);color:var(--sky-hi);border:1px solid rgba(15,78,158,.18);border-bottom:1px solid rgba(15,78,158,.28)}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Button</span></div>

  <div class="rowmeta">Variants</div>
  <div class="row">
    <button class="btn btn--primary">Primary</button>
    <button class="btn btn--secondary">Secondary</button>
    <button class="btn btn--soft">Soft</button>
    <button class="btn btn--ghost">Ghost</button>
    <button class="btn btn--sky">Sky</button>
    <button class="btn btn--sky-soft">Sky soft</button>
  </div>

  <div class="rowmeta">Signals — Ultra, Error</div>
  <div class="row">
    <button class="btn btn--ultra"><span class="glyph"><svg viewBox="0 0 24 24" width="13" height="13"><path d="M12 2 14.6 9.2 22 9.6l-5.7 4.6L18 22l-6-3.8L6 22l1.7-7.8L2 9.6l7.4-.4z"/></svg></span>Upgrade to Pro</button>
    <button class="btn btn--danger"><svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>Delete</button>
  </div>

  <div class="rowmeta">Sizes</div>
  <div class="row">
    <button class="btn btn--secondary btn--xs">XS</button>
    <button class="btn btn--secondary btn--sm">Small</button>
    <button class="btn btn--secondary">Default</button>
    <button class="btn btn--secondary btn--lg">Large</button>
  </div>

  <div class="rowmeta">With icon</div>
  <div class="row">
    <button class="btn btn--primary"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>New</button>
    <button class="btn btn--secondary">Continue<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg></button>
    <button class="btn btn--ghost"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Comment</button>
    <button class="btn btn--secondary btn--icon" aria-label="More"><svg viewBox="0 0 24 24"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg></button>
  </div>

  <div class="rowmeta">With kbd</div>
  <div class="row">
    <button class="btn btn--primary">Send<span class="bk">⌘</span><span class="bk">↵</span></button>
    <button class="btn btn--secondary">Search<span class="bk">⌘</span><span class="bk">K</span></button>
    <button class="btn btn--ghost">Open<span class="bk">O</span></button>
    <button class="btn btn--sky">Ship<span class="bk">⇧</span><span class="bk">S</span></button>
  </div>

  <div class="rowmeta">States</div>
  <div class="row">
    <button class="btn btn--primary"><span class="spin"></span>Saving</button>
    <button class="btn btn--primary" disabled>Disabled</button>
    <button class="btn btn--secondary" disabled>Disabled</button>
  </div>
</div>
</body></html>
