<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.scale{display:grid;gap:5px;margin-top:8px}
.r{display:grid;grid-template-columns:56px 1fr 36px;align-items:center;gap:14px;height:18px}
.r .l{font-family:var(--font-mono);font-size:10px;color:var(--fg-soft);font-weight:600;letter-spacing:.02em}
.r .b{height:6px;background:var(--ink-8);border-radius:2px;display:block}
.r .v{text-align:right;font-family:var(--font-mono);font-size:10.5px;color:var(--fg-strong);font-weight:600}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Spacing</span></div>
  <div class="scale">
    <div class="r"><span class="l">s-1</span><i class="b" style="width:4px"></i><span class="v">4</span></div>
    <div class="r"><span class="l">s-2</span><i class="b" style="width:8px"></i><span class="v">8</span></div>
    <div class="r"><span class="l">s-3</span><i class="b" style="width:12px"></i><span class="v">12</span></div>
    <div class="r"><span class="l">s-4</span><i class="b" style="width:16px"></i><span class="v">16</span></div>
    <div class="r"><span class="l">s-6</span><i class="b" style="width:24px"></i><span class="v">24</span></div>
    <div class="r"><span class="l">s-8</span><i class="b" style="width:32px"></i><span class="v">32</span></div>
    <div class="r"><span class="l">s-12</span><i class="b" style="width:48px"></i><span class="v">48</span></div>
    <div class="r"><span class="l">s-16</span><i class="b" style="width:64px"></i><span class="v">64</span></div>
    <div class="r"><span class="l">s-24</span><i class="b" style="width:96px"></i><span class="v">96</span></div>
    <div class="r"><span class="l">s-32</span><i class="b" style="width:128px"></i><span class="v">128</span></div>
  </div>
</div>
</body></html>
