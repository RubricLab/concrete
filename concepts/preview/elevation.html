<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:12px;padding:8px 4px 4px}
.c{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:0}
.c i{width:60px;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-3);display:block}
.s1 i{box-shadow:var(--shadow-1)}
.s2 i{box-shadow:var(--shadow-2)}
.s3 i{box-shadow:var(--shadow-3)}
.s4 i{box-shadow:var(--shadow-4)}
.c .n{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--fg-strong);white-space:nowrap}
.c .v{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-soft);text-align:center;white-space:nowrap}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Elevation</span></div>
  <div class="grid">
    <div class="c"><i></i><span class="n">hairline</span><span class="v">border only</span></div>
    <div class="c s1"><i></i><span class="n">shadow-1</span><span class="v">rest</span></div>
    <div class="c s2"><i></i><span class="n">shadow-2</span><span class="v">popover</span></div>
    <div class="c s3"><i></i><span class="n">shadow-3</span><span class="v">modal</span></div>
    <div class="c s4"><i></i><span class="n">shadow-4</span><span class="v">overlay</span></div>
  </div>
</div>
</body></html>
