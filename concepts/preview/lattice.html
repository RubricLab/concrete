<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.t{aspect-ratio:16/7;border:1px solid var(--border);border-radius:var(--r-3);position:relative;display:flex;flex-direction:column;justify-content:flex-end;background-color:var(--surface);overflow:hidden;min-width:0}
.t .meta{width:100%;display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:6px 10px;background:color-mix(in srgb,var(--surface) 92%,transparent);border-top:1px solid var(--border);box-sizing:border-box}
.t b{font-weight:700;color:var(--fg-strong);font-size:10.5px;white-space:nowrap}
.t span{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);white-space:nowrap}
.coarse{background-image:linear-gradient(to right,rgba(10,11,15,.055) 1px,transparent 1px),linear-gradient(to bottom,rgba(10,11,15,.055) 1px,transparent 1px);background-size:48px 48px}
.fine{background-image:linear-gradient(to right,rgba(10,11,15,.04) 1px,transparent 1px),linear-gradient(to bottom,rgba(10,11,15,.04) 1px,transparent 1px);background-size:24px 24px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Lattice</span></div>
  <div class="grid">
    <div class="t coarse"><div class="meta"><b>Coarse</b><span>48 · hero</span></div></div>
    <div class="t fine"><div class="meta"><b>Fine</b><span>24 · frame</span></div></div>
  </div>
</div>
</body></html>
