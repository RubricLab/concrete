<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F7F8FA;--surface:#FFFFFF;--sunken:#F1F2F5;
  --ink-9:#0A0B0F;--ink-7:#22242B;--ink-5:#5A5D68;--ink-4:#878A95;--ink-2:#D7D9E0;
  --fg-strong:var(--ink-9);--fg-body:var(--ink-7);--fg-muted:var(--ink-5);--fg-soft:var(--ink-4);
  --border:var(--ink-2);
  --sky:#1F6FD4;--sky-soft:#DDE8F7;--sky-hi:#0F4E9E;
  --terminal:#0EA564;--terminal-soft:#DCF2E8;--terminal-hi:#0A8350;
  --ultra:#6B5BFF;--ultra-soft:#E5E2FF;--ultra-hi:#4F3FE0;
  --error:#E23B3B;--error-soft:#FBE1DF;--error-hi:#A72323;
  --font-sans:"Plus Jakarta Sans",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.rowmeta{font-family:"JetBrains Mono",ui-monospace,Menlo,monospace;font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:14px;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}

/* Pill — read-only info/status. No close affordance. Sits in card footers, row metadata, etc. */
.pill{
  display:inline-flex;align-items:center;gap:5px;
  height:22px;padding:0 10px;
  border-radius:999px;
  background:var(--sunken);color:var(--fg-body);
  border:1px solid var(--border);
  font:500 11.5px/1 var(--font-sans);
  white-space:nowrap;font-variant-numeric:tabular-nums;
  letter-spacing:-.003em;
}
.pill svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex:none;color:var(--fg-soft);margin-left:-3px}

/* Signal variants — quiet washes that carry the semantic color */
.pill--sky{background:var(--sky-soft);border-color:transparent;color:var(--sky-hi)}
.pill--sky svg{color:var(--sky)}
.pill--terminal{background:var(--terminal-soft);border-color:transparent;color:var(--terminal-hi)}
.pill--terminal svg{color:var(--terminal)}
.pill--ultra{background:var(--ultra-soft);border-color:transparent;color:var(--ultra-hi)}
.pill--ultra svg{color:var(--ultra)}
.pill--error{background:var(--error-soft);border-color:transparent;color:var(--error-hi)}
.pill--error svg{color:var(--error)}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Pill</span></div>

  <div class="rowmeta">Default — metadata / info</div>
  <div class="row">
    <span class="pill">Active</span>
    <span class="pill">2h ago</span>
    <span class="pill">v0.3</span>
    <span class="pill">Draft</span>
    <span class="pill">Internal</span>
  </div>

  <div class="rowmeta">With icon</div>
  <div class="row">
    <span class="pill"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>2h ago</span>
    <span class="pill"><svg viewBox="0 0 24 24"><path d="M3 7h18M3 12h18M3 17h18"/></svg>List</span>
    <span class="pill"><svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg>Public</span>
  </div>

  <div class="rowmeta">Signal — status at a glance</div>
  <div class="row">
    <span class="pill pill--terminal">Shipping</span>
    <span class="pill pill--sky">In review</span>
    <span class="pill pill--ultra">Featured</span>
    <span class="pill pill--error">Blocking</span>
  </div>
</div>
</body></html>
