<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.track{margin-top:12px;height:48px;background:var(--sunken);border:1px solid var(--border);border-radius:var(--r-3);position:relative;overflow:hidden}
.m{position:absolute;left:6px;top:50%;transform:translateY(-50%);width:32px;height:32px;background:var(--ink-9);border-radius:var(--r-2);animation:m 2.4s cubic-bezier(.2,0,0,1) infinite alternate}
@keyframes m{from{left:6px}to{left:calc(100% - 38px)}}
.spec{display:grid;grid-template-columns:max-content 1fr;gap:3px 16px;margin-top:10px;font-size:11px}
.spec dt{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-soft);font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding-top:2px}
.spec dd{margin:0;color:var(--fg-strong);font-weight:600;font-size:11.5px}
.spec dd.mono{font-family:var(--font-mono);font-size:11px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Motion</span></div>
  <div class="track"><i class="m"></i></div>
  <dl class="spec">
    <dt>dur</dt><dd>180ms</dd>
    <dt>ease</dt><dd class="mono">cubic-bezier(.2, 0, 0, 1)</dd>
    <dt>reduced</dt><dd>respected</dd>
  </dl>
</div>
</body></html>
