<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F7F8FA;--surface:#FFFFFF;--sunken:#F1F2F5;
  --ink-9:#0A0B0F;--ink-8:#16171C;--ink-7:#22242B;--ink-5:#5A5D68;--ink-4:#878A95;--ink-3:#B4B7C0;--ink-2:#D7D9E0;--ink-1:#E8EAEE;
  --fg-body:var(--ink-7);--fg-muted:var(--ink-5);--fg-soft:var(--ink-4);
  --border:var(--ink-2);
  --sky-ring:rgba(31,111,212,.22);
  --font-sans:"Plus Jakarta Sans",system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.stack{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.opt{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;user-select:none;font-size:12.5px;color:var(--fg-body);max-width:340px}
.opt input{position:absolute;opacity:0;pointer-events:none}

/* Denser: 26x14 with 10px thumb */
.sw{
  width:26px;height:14px;border-radius:7px;
  background:var(--ink-1);border:1px solid var(--border);
  position:relative;flex:none;
  transition:background .16s cubic-bezier(.2,0,0,1),border-color .16s;
}
.sw::after{
  content:"";position:absolute;left:1px;top:1px;
  width:10px;height:10px;border-radius:50%;
  background:#fff;box-shadow:0 1px 1.5px rgba(10,11,15,.25);
  transition:transform .16s cubic-bezier(.2,0,0,1);
}
.opt input:checked + .sw{background:var(--ink-9);border-color:var(--ink-9)}
.opt input:checked + .sw::after{transform:translateX(12px)}
.opt input:focus-visible + .sw{box-shadow:0 0 0 3px var(--sky-ring)}
.opt.is-disabled{opacity:.45;cursor:not-allowed}

.sub{font-size:11px;color:var(--fg-muted);margin-top:1px}
.col{display:flex;flex-direction:column}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Switch</span></div>
  <div class="stack">
    <label class="opt"><span class="col">Notifications<span class="sub">Send weekly digest to my inbox</span></span><input type="checkbox"/><span class="sw"></span></label>
    <label class="opt"><span class="col">Public workspace<span class="sub">Anyone with the link can view</span></span><input type="checkbox" checked/><span class="sw"></span></label>
    <label class="opt is-disabled"><span class="col">SSO enforcement<span class="sub">Available on Enterprise</span></span><input type="checkbox" disabled/><span class="sw"></span></label>
  </div>
</div>
</body></html>
