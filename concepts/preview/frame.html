<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.frame{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-4);overflow:hidden;display:flex;flex-direction:column;margin-top:10px}
.f-head,.f-foot{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;font-size:10.5px}
.f-head{border-bottom:1px solid var(--border-soft)}
.f-foot{border-top:1px solid var(--border-soft);background:var(--raised)}
.f-eyebrow{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-muted)}
.f-meta{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-soft);letter-spacing:.02em}
.f-body{padding:24px 16px;min-height:80px;display:flex;align-items:center;justify-content:center;color:var(--fg-soft);font-size:12px;font-style:italic}
</style></head>
<body>
<div class="card" style="padding:14px 16px">
  <div class="eyebrow-row"><span class="eyebrow">Frame</span></div>
  <div class="frame">
    <div class="f-head"><span class="f-eyebrow">Eyebrow</span><span class="f-meta">meta</span></div>
    <div class="f-body">body</div>
    <div class="f-foot"><span class="f-eyebrow">Footer</span><span class="f-meta">meta</span></div>
  </div>
</div>
</body></html>
