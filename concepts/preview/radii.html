<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:10px}
.c{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.c i{width:56px;height:56px;background:var(--sunken);border:1px solid var(--border);display:block}
.c .n{font-family:var(--font-mono);font-size:10px;font-weight:700;color:var(--fg-strong);white-space:nowrap}
.c .v{font-family:var(--font-mono);font-size:9.5px;color:var(--fg-soft);white-space:nowrap}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Radii</span></div>
  <div class="grid">
    <div class="c"><i style="border-radius:4px"></i><span class="n">r-2</span><span class="v">4px</span></div>
    <div class="c"><i style="border-radius:6px"></i><span class="n">r-3</span><span class="v">6px</span></div>
    <div class="c"><i style="border-radius:10px"></i><span class="n">r-4</span><span class="v">10px</span></div>
    <div class="c"><i style="border-radius:14px"></i><span class="n">r-5</span><span class="v">14px</span></div>
    <div class="c"><i style="border-radius:20px"></i><span class="n">r-6</span><span class="v">20px</span></div>
    <div class="c"><i style="border-radius:9999px"></i><span class="n">pill</span><span class="v">∞</span></div>
  </div>
</div>
</body></html>
