<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
@import url("_card.css");
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.rowmeta{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:14px;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:24px;align-items:center}

/* Caret — the disclosure chevron. SVG, inherits color, rotates on .open.
   Sits on its own baseline so tree/accordion rows can drop it in without extra math. */
.caret{
  display:inline-flex;align-items:center;justify-content:center;
  width:14px;height:14px;
  color:var(--fg-soft);flex:none;
  transition:transform .16s cubic-bezier(.2,0,0,1),color .12s;
}
.caret svg{width:10px;height:10px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.caret.open{transform:rotate(90deg);color:var(--fg-body)}
.caret.up{transform:rotate(-90deg)}
.caret.down{transform:rotate(90deg)}

/* Sizes */
.caret--sm{width:12px;height:12px}
.caret--sm svg{width:8px;height:8px;stroke-width:2.2}
.caret--lg{width:18px;height:18px}
.caret--lg svg{width:13px;height:13px;stroke-width:1.75}

/* Interactive row — shows the common composition: caret + label */
.disc{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 10px 5px 6px;border-radius:4px;
  font:500 12.5px/1 var(--font-sans);color:var(--fg-body);
  cursor:pointer;user-select:none;
  transition:background .12s,color .12s;
}
.disc:hover{background:var(--sunken);color:var(--fg-strong)}
.disc:hover .caret{color:var(--fg-body)}
.disc.open .caret{transform:rotate(90deg);color:var(--fg-strong)}

/* Tree preview — shows caret at multiple depths */
.tree{display:flex;flex-direction:column;gap:2px;font:500 12.5px/1.4 var(--font-sans)}
.tn{display:flex;align-items:center;gap:6px;padding:3px 8px 3px 4px;border-radius:4px;color:var(--fg-body);cursor:pointer}
.tn:hover{background:var(--sunken);color:var(--fg-strong)}
.tn .sp{width:14px;flex:none}
.tn--l1{padding-left:4px}
.tn--l2{padding-left:22px}
.tn--l3{padding-left:40px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Caret</span></div>

  <div class="rowmeta">Directions</div>
  <div class="row">
    <span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    <span class="caret open"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    <span class="caret up"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    <span class="caret down"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
  </div>

  <div class="rowmeta">Sizes</div>
  <div class="row">
    <span class="caret caret--sm"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    <span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
    <span class="caret caret--lg"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>
  </div>

  <div class="rowmeta">In a disclosure row — hover, then click to toggle open</div>
  <div class="row" style="flex-direction:column;align-items:stretch;gap:4px;max-width:260px">
    <span class="disc" onclick="this.classList.toggle('open')"><span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>Environment variables</span>
    <span class="disc open" onclick="this.classList.toggle('open')"><span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>Advanced settings</span>
    <span class="disc" onclick="this.classList.toggle('open')"><span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>Danger zone</span>
  </div>

  <div class="rowmeta">In a tree</div>
  <div class="tree" style="max-width:260px">
    <span class="tn tn--l1"><span class="caret open"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>src</span>
    <span class="tn tn--l2"><span class="caret open"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>components</span>
    <span class="tn tn--l3"><span class="sp"></span>Button.tsx</span>
    <span class="tn tn--l3"><span class="sp"></span>Tooltip.tsx</span>
    <span class="tn tn--l2"><span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>hooks</span>
    <span class="tn tn--l1"><span class="caret"><svg viewBox="0 0 24 24"><path d="M9 6l6 6-6 6"/></svg></span>public</span>
  </div>
</div>
</body></html>
