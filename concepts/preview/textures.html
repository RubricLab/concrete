<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.t{aspect-ratio:4/3;border:1px solid var(--border);border-radius:var(--r-3);position:relative;display:flex;flex-direction:column;justify-content:flex-end;background-color:var(--surface);overflow:hidden;isolation:isolate;min-width:0}
.t .meta{position:relative;z-index:2;width:100%;display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:6px 9px;background:color-mix(in srgb,var(--surface) 92%,transparent);border-top:1px solid var(--border);backdrop-filter:blur(2px);box-sizing:border-box}
.t b{font-weight:700;color:var(--fg-strong);font-size:10.5px;white-space:nowrap}
.t span{font-family:var(--font-mono);font-size:9px;color:var(--fg-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dots{background-image:radial-gradient(var(--dots-rgba) 1px,transparent 1.2px);background-size:16px 16px}
.lines{background-image:linear-gradient(to right,var(--lines-rgba) 1px,transparent 1px),linear-gradient(to bottom,var(--lines-rgba) 1px,transparent 1px);background-size:16px 16px}
.grain{position:relative}
.grain::after{content:"";position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='240' height='240'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 .04 0 0 0 0 .05 0 0 0 0 .08 0 0 0 .7 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.32;mix-blend-mode:multiply}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Textures</span></div>
  <div class="grid">
    <div class="t dots"><div class="meta"><b>Dots</b><span>16 · 1px</span></div></div>
    <div class="t lines"><div class="meta"><b>Lines</b><span>6 · 45°</span></div></div>
    <div class="t grain"><div class="meta"><b>Grain</b><span>noise · 32%</span></div></div>
  </div>
</div>
</body></html>
