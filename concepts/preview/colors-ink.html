<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.ramp{display:grid;grid-template-columns:repeat(9,1fr);gap:4px;margin-top:10px}
.sw{aspect-ratio:1/1.25;border-radius:var(--r-2);padding:7px 8px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:10px;font-weight:700}
.sw i{font-family:var(--font-mono);font-style:normal;font-size:8.5px;opacity:.82}
.sw.lt{color:var(--ink-9)}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Ink · cool graphite</span></div>
  <div class="ramp">
    <div class="sw" style="background:#0A0B0F"><b>9</b><i>0A0B0F</i></div>
    <div class="sw" style="background:#16171C"><b>8</b><i>16171C</i></div>
    <div class="sw" style="background:#22242B"><b>7</b><i>22242B</i></div>
    <div class="sw" style="background:#3A3C45"><b>6</b><i>3A3C45</i></div>
    <div class="sw" style="background:#5A5D68"><b>5</b><i>5A5D68</i></div>
    <div class="sw lt" style="background:#878A95"><b>4</b><i>878A95</i></div>
    <div class="sw lt" style="background:#B4B7C0"><b>3</b><i>B4B7C0</i></div>
    <div class="sw lt" style="background:#D7D9E0"><b>2</b><i>D7D9E0</i></div>
    <div class="sw lt" style="background:#E8EAEE"><b>1</b><i>E8EAEE</i></div>
  </div>
</div>
</body></html>
