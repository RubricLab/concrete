<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-radius:var(--r-3);border:1px solid var(--border);margin-top:6px;font-size:12.5px}
.row .dot{width:8px;height:8px;border-radius:999px;display:inline-block;margin-right:10px}
.row b{font-weight:600;color:var(--fg-strong);flex:1}
.row span.hex{font-family:var(--font-mono);font-size:10.5px;color:var(--fg-muted)}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Signals · three states</span></div>
  <div class="row"><i class="dot" style="background:#16C46A"></i><b>Terminal — live / shipping</b><span class="hex">#16C46A</span></div>
  <div class="row"><i class="dot" style="background:#6B5BFF"></i><b>Ultra — pro / featured / info</b><span class="hex">#6B5BFF</span></div>
  <div class="row"><i class="dot" style="background:#F03A3A"></i><b>Error — destructive</b><span class="hex">#F03A3A</span></div>
</div>
</body></html>
