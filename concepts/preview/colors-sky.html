<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.ramp{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-top:10px}
.sw{aspect-ratio:1/1.25;border-radius:var(--r-2);padding:7px 8px;display:flex;flex-direction:column;justify-content:space-between;color:#fff;border:1px solid rgba(0,0,0,.05)}
.sw b{font-size:10px;font-weight:700}
.sw i{font-family:var(--font-mono);font-style:normal;font-size:8.5px;opacity:.85}
.sw.lt{color:var(--ink-9)}
.note{margin-top:10px;font-size:11.5px;color:var(--fg-muted);max-width:48ch}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Accent · Sky</span></div>
  <div class="ramp">
    <div class="sw lt" style="background:#EEF3FB"><b>1</b><i>EEF3FB</i></div>
    <div class="sw lt" style="background:#D9E6F8"><b>2</b><i>D9E6F8</i></div>
    <div class="sw lt" style="background:#A9C6EF"><b>3</b><i>A9C6EF</i></div>
    <div class="sw" style="background:#4E8BDE"><b>4</b><i>4E8BDE</i></div>
    <div class="sw" style="background:#1F6FD4"><b>Sky</b><i>1F6FD4</i></div>
    <div class="sw" style="background:#0F4E9E"><b>hi</b><i>0F4E9E</i></div>
  </div>
  <p class="note">The only chromatic UI voice. Nothing else gets sky.</p>
</div>
</body></html>
