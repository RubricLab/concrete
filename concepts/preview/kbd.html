<!doctype html>
<html><head><meta charset="utf-8"/>
<style>
@import url("_card.css");
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;background:var(--canvas);font-family:var(--font-sans);color:var(--fg-body);-webkit-font-smoothing:antialiased;font-feature-settings:"ss01","cv01","tnum"}
body{padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;min-height:90px}
.eyebrow-row{display:flex;margin-bottom:14px}
.eyebrow{font-size:11px;color:var(--fg-muted);letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.rowmeta{font-family:var(--font-mono);font-size:9.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--fg-soft);margin-top:12px;margin-bottom:4px}
.row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
.hint{font-size:13px;color:var(--fg-muted);display:inline-flex;align-items:center;gap:6px}

.kbd{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:20px;height:20px;padding:0 5px;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--surface);
  color:var(--fg-body);
  font:600 10.5px/1 var(--font-mono);
  letter-spacing:0;
  box-shadow:0 1px 0 var(--border);
}
.kbd--dark{background:var(--ink-9);border-color:var(--ink-9);color:#fff;box-shadow:0 1px 0 #000}

.combo{display:inline-flex;align-items:center;gap:2px;color:var(--fg-muted);font-size:11px}
.combo .sep{color:var(--fg-faint,#B4B7C0);margin:0 1px}
</style></head>
<body>
<div class="card">
  <div class="eyebrow-row"><span class="eyebrow">Kbd</span></div>

  <div class="rowmeta">Keys</div>
  <div class="row">
    <kbd class="kbd">⌘</kbd>
    <kbd class="kbd">⇧</kbd>
    <kbd class="kbd">⌥</kbd>
    <kbd class="kbd">↵</kbd>
    <kbd class="kbd">Esc</kbd>
    <kbd class="kbd">Tab</kbd>
    <kbd class="kbd">K</kbd>
    <kbd class="kbd">?</kbd>
  </div>

  <div class="rowmeta">Combos in context</div>
  <div class="row">
    <span class="hint">Open command menu <span class="combo"><kbd class="kbd">⌘</kbd><span class="sep">+</span><kbd class="kbd">K</kbd></span></span>
  </div>
  <div class="row">
    <span class="hint">Quick save <span class="combo"><kbd class="kbd">⌘</kbd><span class="sep">+</span><kbd class="kbd">S</kbd></span></span>
  </div>
  <div class="row">
    <span class="hint">Navigate <span class="combo"><kbd class="kbd">↑</kbd><kbd class="kbd">↓</kbd></span>  then  <span class="combo"><kbd class="kbd">↵</kbd></span></span>
  </div>

  <div class="rowmeta">Dark</div>
  <div class="row">
    <kbd class="kbd kbd--dark">⌘</kbd>
    <kbd class="kbd kbd--dark">K</kbd>
  </div>
</div>
</body></html>
