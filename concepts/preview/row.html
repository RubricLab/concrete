<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
.rows{display:grid;gap:1px;margin-top:8px;border:1px dashed var(--border);border-radius:var(--r-3);padding:6px;background:var(--raised)}
.row{display:grid;grid-template-columns:16px 1fr auto;align-items:center;column-gap:10px;padding:8px 10px;border-radius:var(--r-2);font-size:13px;color:var(--fg-body);min-height:32px}
.r-ic{width:16px;height:16px;background:var(--mist);border-radius:3px}
.r-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.r-trail{color:var(--fg-soft);font-family:var(--font-mono);font-size:11px}
</style></head>
<body>
<div class="card" style="padding:14px 16px">
  <div class="eyebrow-row"><span class="eyebrow">Row</span></div>
  <div class="rows">
    <div class="row"><span class="r-ic"></span><span class="r-label">Label</span><span class="r-trail">trailing</span></div>
    <div class="row"><span class="r-ic"></span><span class="r-label">Label</span><span class="r-trail">trailing</span></div>
    <div class="row"><span class="r-ic"></span><span class="r-label">Label</span><span class="r-trail">trailing</span></div>
  </div>
</div>
</body></html>
